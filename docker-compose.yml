services:
  backend:
    build:
      context: .
      dockerfile: dAiRaG/backend/Dockerfile
    env_file:
      - dAiRaG/.env
    environment:
      DAIRAG_SERVE_FRONTEND: "false"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./dataset:/app/dataset:ro
      - ./dAiRaG/frontend/data:/app/dAiRaG/frontend/data:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./dAiRaG/frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
